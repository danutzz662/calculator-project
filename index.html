<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="source.js" defer></script>
  <title>Calculator</title>
</head>

<body>
  <div class="calculator" draggable="false">
    <div class="display" draggable="false">
      <p class="displayText"></p>
    </div>
    <div class="buttons" draggable="false">
      <div class="row" draggable="false">
        <div class="button clear">C</div>
        <div class="button del">Del</div>
        <div class="button power">^</div>
        <div class="button sign">/</div>
      </div>
      <div class="row" draggable="false">
        <div class="button number">7</div>
        <div class="button number">8</div>
        <div class="button number">9</div>
        <div class="button sign">*</div>
      </div>
      <div class="row" draggable="false">
        <div class="button number">4</div>
        <div class="button number">5</div>
        <div class="button number">6</div>
        <div class="button sign">-</div>
      </div>
      <div class="row" draggable="false">
        <div class="button number">1</div>
        <div class="button number">2</div>
        <div class="button number">3</div>
        <div class="button sign">+</div>
      </div>
      <div class="row" draggable="false">
        <div class="button"></div>
        <div class="button number">0</div>
        <div class="button period">.</div>
        <div class="button sign">=</div>
      </div>
    </div>
  </div>

</body>

</html>
